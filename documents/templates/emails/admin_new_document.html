<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="x-apple-disable-message-reformatting">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новый документ #{{ id }}</title>
    <style>
      /* Для редких клиентов, поддерживающих head-стили. Основное — инлайн. */
    </style>
  </head>
  <body style="margin:0; padding:0; background-color:#f6f8fb;">
    <center role="article" aria-roledescription="email" lang="ru" style="width:100%; background:#f6f8fb;">
      <table role="presentation" style="width:100%; border-collapse:collapse; border:0; border-spacing:0; background:#f6f8fb;">
        <tr>
          <td align="center" style="padding:24px 12px;">
            <!-- Card -->
            <table role="presentation" style="width:100%; max-width:640px; border-collapse:collapse; border-spacing:0; background:#ffffff; border:1px solid #e5e7eb; border-radius:10px; overflow:hidden;">
              <!-- Header -->
              <tr>
                <td style="background:#0d6efd; padding:18px 24px; color:#ffffff; font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif; font-weight:600; font-size:18px;">
                  Новый документ #{{ id }}
                </td>
              </tr>

              <!-- Body -->
              <tr>
                <td style="padding:24px; font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:#1f2937; font-size:14px; line-height:1.6;">
                  <p style="margin:0 0 12px 0;">Пользователь: <strong>{{ owner }}</strong></p>
                  <p style="margin:0 0 12px 0;">Статус:
                    <span style="display:inline-block; padding:2px 8px; border-radius:999px; background:#e9f2ff; color:#0d6efd; font-weight:600;">
                      {{ status }}
                    </span>
                  </p>
                  <p style="margin:0 0 16px 0;">Загружен: {{ uploaded_at }}</p>

                  <!-- CTA -->
                  <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top:8px;">
                    <tr>
                      <td align="center" bgcolor="#0d6efd" style="border-radius:6px;">
                        <a href="{{ admin_document_url|default:'#' }}"
                           style="display:inline-block; padding:10px 16px; color:#ffffff; text-decoration:none; font-weight:600; font-size:14px; font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
                          Открыть в админке
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>

              <!-- Footer -->
              <tr>
                <td style="background:#f8fafc; padding:16px 24px; color:#6b7280; font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif; font-size:12px;">
                  Это системное письмо. Не отвечайте на него.
                </td>
              </tr>
            </table>
            <!-- /Card -->

            <!-- Legal -->
            <p style="margin:12px 0 0 0; color:#9aa3af; font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif; font-size:12px;">
              © {{ now|default:"" }} Documents Service
            </p>
          </td>
        </tr>
      </table>
    </center>
  </body>
</html>
