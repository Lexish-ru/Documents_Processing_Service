services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    build: .
    env_file: .env
    volumes:
      - .:/app
      - static:/app/static
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: bash -c "python manage.py collectstatic --noinput &&
                      python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  celery:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    command: bash -c "celery -A config worker -l info"

  celery_beat:
     build: .
     command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
     volumes:
       - .:/app
     depends_on:
       - redis
       - db
     restart: always


  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/static
      - media:/app/media
    depends_on:
      - web



volumes:
  pgdata:
  static:
  media:
